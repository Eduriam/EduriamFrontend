name: CI
on:
  push:
    branches: ["dev"]
permissions:
  contents: read
  packages: read
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN || github.token }}
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24.x"
      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.9.3 --activate
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn build
