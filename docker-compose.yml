services:
  eduriam-frontend-dev:
    build:
      context: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # Use it's own node_modules and .next directory
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: yarn dev

  eduriam-frontend-build:
    build: .
    environment:
      - NODE_ENV=production
    command: yarn build

  eduriam-frontend-lint:
    build: .
    environment:
      - NODE_ENV=production
    command: yarn lint

  eduriam-frontend-prettier:
    build: .
    volumes:
      - .:/app
      # Use it's own node_modules and .next directory
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=production
    command: yarn prettier

  eduriam-frontend-storybook:
    build: .
    volumes:
      - .:/app
      # Use it's own node_modules and .next directory
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    ports:
      - "6006:6006"
    command: yarn storybook
